const map = L.map('map').setView([45.2396, -73.3897], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
  subdomains: 'abcd',
  attribution: '© OpenStreetMap © CARTO'
}).addTo(map);

const STATUS_COLORS = {
  'PROSPECT':       '#28a745',
  'Déjà Pylex':     '#fd7e14',
  'Déjà Permafix':  '#6f42c1',
  'Les deux':       '#dc3545'
};

function statusBadge(s) {
  const cls = s === 'PROSPECT' ? 'badge-prospect'
           : s === 'Déjà Pylex' ? 'badge-pylex'
           : s === 'Déjà Permafix' ? 'badge-permafix'
           : 'badge-both';
  return `<span class="badge ${cls}">${s}</span>`;
}

function makeIcon(status) {
  const color = STATUS_COLORS[status] || '#888';
  return L.divIcon({
    className: 'custom-pin',
    html: `<div style="width:22px;height:22px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.5);"></div>`,
    iconSize: [22,22],
    iconAnchor: [11,11]
  });
}

function popup(d) {
  const phone = d.phone ? `<div class="info">📞 <a href="tel:${d.phone}">${d.phone}</a></div>` : '';
  const website = d.website ? `<div class="info">🌐 <a href="${d.website}" target="_blank">Site web</a></div>` : '';
  const rating = d.rating ? `<div class="info">⭐ ${d.rating} (${d.reviews} avis)</div>` : '';
  const maps = d.maps ? `<div class="info">📍 <a href="${d.maps}" target="_blank">Voir sur Google Maps</a></div>` : '';
  return `<div class="popup">
    <h3>${d.name}</h3>
    <div class="meta">${statusBadge(d.status)} · ${d.cluster} (${d.fsa})</div>
    <div class="info">${d.address}</div>
    ${phone}${website}${rating}${maps}
  </div>`;
}

const cluster = L.markerClusterGroup({ maxClusterRadius: 50 });
let allMarkers = [];

DATA.forEach(d => {
  const m = L.marker([d.lat, d.lng], { icon: makeIcon(d.status) });
  m.bindPopup(popup(d));
  m._data = d;
  allMarkers.push(m);
});

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase().trim();
  const fProspect = document.getElementById('f-prospect').checked;
  const fPylex = document.getElementById('f-pylex').checked;
  const fPermafix = document.getElementById('f-permafix').checked;
  const fBoth = document.getElementById('f-both').checked;
  const fWebsite = document.getElementById('f-website').checked;
  const fRating = document.getElementById('f-rating').checked;

  cluster.clearLayers();
  let shown = 0;
  allMarkers.forEach(m => {
    const d = m._data;
    if (d.status === 'PROSPECT' && !fProspect) return;
    if (d.status === 'Déjà Pylex' && !fPylex) return;
    if (d.status === 'Déjà Permafix' && !fPermafix) return;
    if (d.status === 'Les deux' && !fBoth) return;
    if (fWebsite && !d.website) return;
    if (fRating && (!d.rating || parseFloat(d.rating) < 4)) return;
    if (search) {
      const blob = (d.name + ' ' + d.address + ' ' + d.cluster).toLowerCase();
      if (!blob.includes(search)) return;
    }
    cluster.addLayer(m);
    shown++;
  });
  map.addLayer(cluster);
  document.getElementById('stat-shown').textContent = `Affiché: ${shown}`;
}

document.getElementById('stat-total').textContent = `Total: ${DATA.length}`;
['search','f-prospect','f-pylex','f-permafix','f-both','f-website','f-rating'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener(el.type === 'text' ? 'input' : 'change', applyFilters);
});
applyFilters();
</script>
